display_information:
  name: hey-otis
  description: Personal capture for Open Brain. Listens to a designated Slack channel and embeds messages into the thoughts table.
  background_color: "#1f2937"

features:
  bot_user:
    display_name: hey-otis
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:history
      - groups:history

settings:
  event_subscriptions:
    # Replace request_url with your deployed Edge Function URL after Phase 4:
    # https://<project-ref>.supabase.co/functions/v1/ingest-thought
    request_url: https://REPLACE-WITH-PROJECT-REF.supabase.co/functions/v1/ingest-thought
    bot_events:
      - message.channels
      - message.groups
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
